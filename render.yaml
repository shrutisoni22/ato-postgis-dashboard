services:
  - type: web
    name: ato-dashboard-postgis
    runtime: python
    rootDir: backend_postgis
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ato-dashboard-db
          property: connectionString

databases:
  - name: ato-dashboard-db
    databaseName: ato_dashboard
    user: ato
