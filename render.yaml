services:
  - type: web
    name: ato-dashboard-postgis
    runtime: python
    plan: free
    buildCommand: pip install -r backend_postgis/requirements.txt
    startCommand: uvicorn app:app --app-dir backend_postgis --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ato-dashboard-db
          property: connectionString

databases:
  - name: ato-dashboard-db
    plan: free
    databaseName: ato_dashboard
    user: ato
